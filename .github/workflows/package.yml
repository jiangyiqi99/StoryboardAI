name: Build and Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            script: dist:macarm64
            artifact: macos-arm64
          - name: macOS x64
            os: macos-13
            script: dist:macx64
            artifact: macos-x64
          - name: Windows x64
            os: windows-latest
            script: dist:win
            artifact: windows-x64
          - name: Linux x64
            os: ubuntu-latest
            script: dist:linux
            artifact: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install macOS native dependencies
        if: runner.os == 'macOS'
        run: brew install pkgconf ffmpeg

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update && sudo apt-get install -y
          patchelf pkg-config libavformat-dev libavcodec-dev libavutil-dev
          libswscale-dev libswresample-dev

      - name: Set up Windows native build environment
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-ffmpeg

      - name: Install dependencies
        if: runner.os != 'Windows'
        run: npm ci

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: npm ci

      - name: Package application
        if: runner.os != 'Windows'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.script }}

      - name: Package Windows application
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: npm run ${{ matrix.script }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storyboard-ai-editor-${{ matrix.artifact }}
          path: release/**
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: storyboard-ai-editor-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**
